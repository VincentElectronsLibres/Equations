<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Résoudre des Équations - Révisions CE1D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #fafafa;
            color: #222;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 1.5rem 0;
            margin-bottom: 2rem;
        }

        header .logo {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 0.5rem;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #222;
        }

        header p {
            font-size: 0.95rem;
            color: #999;
            font-weight: 400;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #eee;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #222;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .examples {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .examples p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .example-btn {
            display: inline-block;
            padding: 0.5rem 0.75rem;
            background: white;
            color: #4a90e2;
            border: 1px solid #4a90e2;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
            font-weight: 500;
        }

        .example-btn:hover {
            background: #4a90e2;
            color: white;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        button {
            flex: 1;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-solve {
            background: #4a90e2;
            color: white;
        }

        .btn-solve:hover {
            background: #2e5fc0;
        }

        .btn-clear {
            background: #f5f5f5;
            color: #222;
            border: 1px solid #ddd;
        }

        .btn-clear:hover {
            background: #eeeeee;
        }

        .solution {
            display: none;
        }

        .solution.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .step {
            background: #f9f9f9;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border-radius: 6px;
            border-left: 3px solid #4a90e2;
        }

        .step-number {
            display: inline-block;
            background: #4a90e2;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-weight: bold;
            margin-right: 0.75rem;
            font-size: 0.9rem;
        }

        .step h3 {
            color: #222;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            font-size: 1rem;
        }

        .step p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .equation {
            background: white;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            color: #222;
            font-family: 'Courier New', monospace;
            margin: 0.75rem 0;
            border: 1px solid #ddd;
        }

        .explanation {
            background: #e8f4fd;
            padding: 0.75rem;
            border-radius: 4px;
            color: #333;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            border-left: 3px solid #4a90e2;
        }

        .final-answer {
            background: linear-gradient(135deg, #f5f5f5 0%, #eeeeee 100%);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            margin-top: 1.5rem;
            border: 1px solid #ddd;
        }

        .final-answer h2 {
            color: #222;
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }

        .final-answer .answer-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4a90e2;
            font-family: 'Courier New', monospace;
        }

        .verification {
            background: #fffbf0;
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            border-left: 3px solid #f5a623;
        }

        .verification h3 {
            color: #f5a623;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .verification p {
            color: #666;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 6px;
            border-left: 3px solid #c33;
            display: none;
            margin-bottom: 1rem;
        }

        .error.show {
            display: block;
        }

        .tip {
            background: #e8f4fd;
            padding: 1rem;
            border-radius: 6px;
            border-left: 3px solid #4a90e2;
            color: #333;
            margin-top: 1.5rem;
            font-size: 0.95rem;
        }

        .tip strong {
            display: block;
            margin-bottom: 0.5rem;
            color: #222;
        }

        footer {
            text-align: center;
            color: #999;
            margin-top: 2rem;
            padding: 1rem 0;
            border-top: 1px solid #eee;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 1rem;
            }

            button {
                padding: 0.65rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🔢 Révisions CE1D</div>
            <h1>Résoudre des Équations</h1>
            <p>Tape ton équation et résous-la pas à pas</p>
        </header>

        <div class="card">
            <div class="input-section">
                <label for="equation">Tape ton équation :</label>
                <input 
                    type="text" 
                    id="equation" 
                    placeholder="Exemples: 2*x + 3 = 7  ou  3*(x - 4) + 2 = 6"
                    autofocus
                >
                
                <div class="examples">
                    <p>📝 Exemples à tester :</p>
                    <button class="example-btn" onclick="setExample('2*x + 3 = 7')">2x + 3 = 7</button>
                    <button class="example-btn" onclick="setExample('2*(x + 3) = -8')">2(x + 3) = -8</button>
                    <button class="example-btn" onclick="setExample('4*x - 11 = 15 + 17*x')">4x - 11 = 15 + 17x</button>
                    <button class="example-btn" onclick="setExample('2/3*x - 1 = 3')">2/3*x - 1 = 3</button>
                    <button class="example-btn" onclick="setExample('3*(x - 4) + 2 = 6')">3(x - 4) + 2 = 6</button>
                </div>

                <div class="button-group">
                    <button class="btn-solve" onclick="solveEquation()">✨ Résoudre</button>
                    <button class="btn-clear" onclick="clearAll()">🗑️ Effacer</button>
                </div>
            </div>
        </div>

        <div class="error" id="error"></div>

        <div class="solution" id="solution">
            <div id="steps"></div>
            <div class="final-answer">
                <h2>Réponse :</h2>
                <div class="answer-value" id="answer"></div>
            </div>
        </div>

        <div class="tip">
            <strong>💡 Conseil :</strong>
            Utilise * pour la multiplication, / pour la division, et () pour les parenthèses. Par exemple: 2*x + 3 = 7
        </div>
    </div>

    <footer>
        <p>Créé par Electrons Libres • Révisions CE1D • Mathématiques</p>
    </footer>

    <script>
        function setExample(equation) {
            document.getElementById('equation').value = equation;
            solveEquation();
        }

        function clearAll() {
            document.getElementById('equation').value = '';
            document.getElementById('solution').classList.remove('show');
            document.getElementById('error').classList.remove('show');
            document.getElementById('equation').focus();
        }

        function solveEquation() {
            const input = document.getElementById('equation').value.trim();
            const errorDiv = document.getElementById('error');
            const solutionDiv = document.getElementById('solution');
            
            if (!input) {
                showError('Veuillez entrer une équation !');
                return;
            }

            try {
                const parts = input.split('=');
                if (parts.length !== 2) {
                    throw new Error('L\'équation doit contenir un seul signe = (par exemple: 2*x + 3 = 7)');
                }

                const leftSide = parts[0].trim();
                const rightSide = parts[1].trim();

                if (!input.toLowerCase().includes('x')) {
                    throw new Error('L\'équation doit contenir la variable x');
                }

                const solution = parseAndSolve(leftSide, rightSide);
                
                if (solution === null) {
                    throw new Error('Cette équation n\'a pas de solution unique.');
                }

                displaySolution(leftSide, rightSide, solution);
                errorDiv.classList.remove('show');
                solutionDiv.classList.add('show');

            } catch (error) {
                showError(error.message);
                solutionDiv.classList.remove('show');
            }
        }

        function parseAndSolve(leftStr, rightStr) {
            const createFunc = (str) => {
                return (x) => {
                    let expr = str.replace(/(\d)\s*\(/g, '$1*(');
                    expr = expr.replace(/\)\s*\(/g, ')*(');
                    expr = expr.replace(/x/gi, `(${x})`);
                    try {
                        return Function('"use strict"; return (' + expr + ')')();
                    } catch {
                        return NaN;
                    }
                };
            };

            const leftFunc = createFunc(leftStr);
            const rightFunc = createFunc(rightStr);

            for (let x = -1000; x <= 1000; x += 0.1) {
                const leftVal = leftFunc(x);
                const rightVal = rightFunc(x);
                
                if (Math.abs(leftVal - rightVal) < 0.0001) {
                    const rounded = Math.round(x * 10) / 10;
                    if (Math.abs(leftFunc(rounded) - rightFunc(rounded)) < 0.01) {
                        displaySolution(leftStr, rightStr, rounded);
                        return rounded;
                    }
                }
            }

            return null;
        }

        function displaySolution(leftStr, rightStr, solution) {
            const stepsDiv = document.getElementById('steps');
            let html = '';

            html += `
                <div class="step">
                    <h3><span class="step-number">1</span>L'équation de départ</h3>
                    <div class="equation">${leftStr} = ${rightStr}</div>
                    <p class="explanation">C'est l'équation qu'il faut résoudre. Notre objectif : trouver la valeur de x.</p>
                </div>
            `;

            html += `
                <div class="step">
                    <h3><span class="step-number">2</span>Résolution</h3>
                    <p class="explanation">On a trouvé que <strong>x = ${solution}</strong></p>
                </div>
            `;

            const leftVal = evaluateExpression(leftStr, solution);
            const rightVal = evaluateExpression(rightStr, solution);
            
            html += `
                <div class="step">
                    <h3><span class="step-number">3</span>Vérification 🔍</h3>
                    <div class="verification">
                        <h3>On remplace x par ${solution} :</h3>
                        <p><strong>Côté gauche :</strong> ${leftStr.replace(/x/gi, solution)} = ${leftVal.toFixed(4)}</p>
                        <p><strong>Côté droit :</strong> ${rightStr.replace(/x/gi, solution)} = ${rightVal.toFixed(4)}</p>
                        <p style="margin-top: 0.75rem; font-weight: bold; color: #4a90e2;">✅ Les deux côtés sont égaux ! Réponse correcte.</p>
                    </div>
                </div>
            `;

            stepsDiv.innerHTML = html;
            document.getElementById('answer').textContent = `x = ${solution}`;
        }

        function evaluateExpression(expr, x) {
            try {
                let evalExpr = expr.replace(/(\d)\s*\(/g, '$1*(');
                evalExpr = evalExpr.replace(/\)\s*\(/g, ')*(');
                evalExpr = evalExpr.replace(/x/gi, `(${x})`);
                return Function('"use strict"; return (' + evalExpr + ')')();
            } catch {
                return NaN;
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.innerHTML = `<strong>⚠️ Erreur :</strong> ${message}`;
            errorDiv.classList.add('show');
        }

        document.getElementById('equation').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                solveEquation();
            }
        });
    </script>
</body>
</html>
